name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write      # create tags + GitHub releases
  issues: write        # comment on issues when released
  pull-requests: write # comment on PRs when released

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run after CI passes — reuse the same commit SHA
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for semantic-release

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
