name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
      ref:
        description: Branch or SHA to deploy (defaults to develop for preview, main for production)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || (inputs.environment == 'production' && 'main' || 'develop') }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run database migrations
        run: pnpm prisma migrate deploy
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: pnpm exec opennextjs-cloudflare build && node scripts/patch-cf-externals.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy
        run: pnpm exec wrangler deploy --env ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          OPEN_NEXT_DEPLOY: "true"

      - name: CF Dashboard logs link
        if: always()
        run: |
          WORKER=${{ inputs.environment == 'production' && 'eorzea-estates' || 'eorzea-estates-preview' }}
          echo "### Cloudflare Worker Logs" >> $GITHUB_STEP_SUMMARY
          echo "[View logs in CF Dashboard](https://dash.cloudflare.com/${{ vars.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/${WORKER}/production/logs)" >> $GITHUB_STEP_SUMMARY
