<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 46" width="200" height="46">
  <style>
    /* ── Default: Dark theme ── */
    :root {
      --stone-s:    #1c3050;
      --stone-e:    #0c1a2c;
      --roof-s:     #0c1828;
      --roof-e:     #182840;
      --gold-s:     #f5e090;
      --gold-m:     #d09510;
      --gold-e:     #8a5c05;
      --cryst-s:    #c8eeff;
      --cryst-e:    #1a68c0;
      --win-s:      #ffe898;
      --door-bg:    #05101e;
      --star-color: #b0d0ff;
      --star-op:    0.55;
      --bloom-op:   0.14;
      --sep-op:     0.35;
    }

    /* ── Light theme override ── */
    @media (prefers-color-scheme: light) {
      :root {
        --stone-s:    #3d5270;
        --stone-e:    #2c3e58;
        --roof-s:     #1e2e44;
        --roof-e:     #2a3e58;
        --gold-s:     #c87000;
        --gold-m:     #7a4200;
        --gold-e:     #4c2800;
        --cryst-s:    #80c8f8;
        --cryst-e:    #0a48a0;
        --win-s:      #c87020;
        --door-bg:    #1c2e44;
        --star-color: #4a6888;
        --star-op:    0.55;
        --bloom-op:   0.10;
        --sep-op:     0.25;
      }
    }
  </style>

  <defs>
    <linearGradient id="stoneN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color: var(--stone-s)"/>
      <stop offset="100%" style="stop-color: var(--stone-e)"/>
    </linearGradient>
    <linearGradient id="roofN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color: var(--roof-s)"/>
      <stop offset="100%" style="stop-color: var(--roof-e)"/>
    </linearGradient>
    <linearGradient id="goldN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color: var(--gold-s)"/>
      <stop offset="45%"  style="stop-color: var(--gold-m)"/>
      <stop offset="100%" style="stop-color: var(--gold-e)"/>
    </linearGradient>
    <radialGradient id="winN" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   style="stop-color: var(--win-s); stop-opacity: 0.85"/>
      <stop offset="100%" style="stop-color: var(--win-s); stop-opacity: 0"/>
    </radialGradient>
    <radialGradient id="crystN" cx="40%" cy="20%" r="70%">
      <stop offset="0%"   style="stop-color: var(--cryst-s)"/>
      <stop offset="100%" style="stop-color: var(--cryst-e)"/>
    </radialGradient>
    <filter id="winBloomN" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <filter id="crystBloomN" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stars (clustered around the roof area) -->
  <g style="fill: var(--star-color); opacity: var(--star-op)">
    <circle cx="3"  cy="5"   r="0.7"/>
    <circle cx="10" cy="1.5" r="0.5"/>
    <circle cx="34" cy="1.5" r="0.5"/>
    <circle cx="41" cy="5"   r="0.7"/>
  </g>

  <!-- Window warm bloom -->
  <ellipse cx="16" cy="30" rx="7" ry="5"
           fill="#ffcc40" style="opacity: var(--bloom-op)" filter="url(#winBloomN)"/>
  <ellipse cx="28" cy="30" rx="7" ry="5"
           fill="#ffcc40" style="opacity: var(--bloom-op)" filter="url(#winBloomN)"/>

  <!-- House body -->
  <rect x="7" y="18" width="30" height="27"
        fill="url(#stoneN)" stroke="url(#goldN)" stroke-width="1.2"/>

  <!-- Roof -->
  <polygon points="3,18 22,2 41,18"
           fill="url(#roofN)" stroke="url(#goldN)" stroke-width="1.2"/>

  <!-- Roof–wall join -->
  <line x1="3" y1="18" x2="41" y2="18"
        stroke="url(#goldN)" stroke-width="0.5" opacity="0.4"/>

  <!-- Left arched window -->
  <path d="M 10,35 L 10,26 A 5,5 0 0,1 20,26 L 20,35 Z"
        fill="url(#winN)" stroke="url(#goldN)" stroke-width="0.8"/>
  <line x1="15" y1="26" x2="15" y2="35" stroke="url(#goldN)" stroke-width="0.5" opacity="0.5"/>
  <line x1="10" y1="31" x2="20" y2="31" stroke="url(#goldN)" stroke-width="0.5" opacity="0.5"/>

  <!-- Right arched window -->
  <path d="M 24,35 L 24,26 A 5,5 0 0,1 34,26 L 34,35 Z"
        fill="url(#winN)" stroke="url(#goldN)" stroke-width="0.8"/>
  <line x1="29" y1="26" x2="29" y2="35" stroke="url(#goldN)" stroke-width="0.5" opacity="0.5"/>
  <line x1="24" y1="31" x2="34" y2="31" stroke="url(#goldN)" stroke-width="0.5" opacity="0.5"/>

  <!-- Arched door -->
  <path d="M 17,45 L 17,36 A 5,5 0 0,1 27,36 L 27,45 Z"
        style="fill: var(--door-bg)" stroke="url(#goldN)" stroke-width="0.8"/>

  <!-- Aetheryte crystal at roof peak -->
  <g filter="url(#crystBloomN)">
    <polygon points="22,0 25.5,7 22,9.5 18.5,7" fill="url(#crystN)"/>
    <polygon points="22,0 25.5,7 22,5"           fill="white" opacity="0.4"/>
  </g>

  <!-- Vertical separator -->
  <line x1="50" y1="7" x2="50" y2="39"
        stroke="url(#goldN)" stroke-width="0.8" style="opacity: var(--sep-op)"/>

  <!-- "EORZEA" -->
  <text x="57" y="24"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-weight="bold" letter-spacing="3"
        fill="url(#goldN)">EORZEA</text>

  <!-- "ESTATES" -->
  <text x="57" y="39"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="10.5" font-weight="normal" letter-spacing="5"
        fill="url(#goldN)" opacity="0.88">ESTATES</text>
</svg>
